<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVDB — Video</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#08080b;
  --s1:#0e0e13;
  --s2:#14141c;
  --border:rgba(255,255,255,.07);
  --red:#e8192c;
  --red2:#ff4d5e;
  --gold:#f5c842;
  --text:#ebebf0;
  --muted:#55556a;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'Outfit',sans-serif;
  --radius:14px;
  --card-w:220px;
}
html{scroll-behavior:smooth;}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9000;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);
}

/* ── TOPBAR ── */
#topbar{
  position:sticky;top:0;z-index:500;
  background:rgba(8,8,11,.9);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.topbar-inner{
  max-width:1800px;margin:0 auto;
  padding:0 20px;height:58px;
  display:flex;align-items:center;gap:16px;
}
.logo{
  font-family:var(--font-display);
  font-size:28px;letter-spacing:3px;color:var(--red);
  flex-shrink:0;text-shadow:0 0 24px rgba(232,25,44,.4);
}
.logo em{color:var(--text);font-style:normal;}

.search-box{flex:1;max-width:480px;position:relative;}
.search-box input{
  width:100%;height:38px;
  background:var(--s2);border:1px solid var(--border);border-radius:10px;
  padding:0 38px 0 14px;color:var(--text);
  font-family:var(--font-body);font-size:14px;outline:none;transition:.2s;
}
.search-box input::placeholder{color:var(--muted);}
.search-box input:focus{border-color:rgba(232,25,44,.5);}
.search-icon{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}

.topbar-right{margin-left:auto;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.count-badge{
  font-size:12px;color:var(--muted);white-space:nowrap;
  font-variant-numeric:tabular-nums;
}

/* ── CATEGORY BAR ── */
#catBar{
  position:sticky;top:58px;z-index:490;
  background:rgba(8,8,11,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 20px;overflow-x:auto;scrollbar-width:none;
}
#catBar::-webkit-scrollbar{display:none;}
.cat-inner{
  max-width:1800px;margin:0 auto;
  display:flex;align-items:center;gap:6px;
  height:44px;width:max-content;min-width:100%;
}
.cat-btn{
  padding:5px 16px;height:28px;border-radius:999px;
  border:1px solid var(--border);background:transparent;
  color:var(--muted);font-family:var(--font-body);font-size:12px;font-weight:500;
  cursor:pointer;transition:.15s;white-space:nowrap;display:flex;align-items:center;
}
.cat-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2);}
.cat-btn.active{
  background:var(--red);border-color:var(--red);color:#fff;
  box-shadow:0 0 14px rgba(232,25,44,.35);
}

/* ── MAIN ── */
#app{max-width:1800px;margin:0 auto;padding:20px 20px 80px;}
#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(var(--card-w),1fr));
  gap:14px;
}

/* ── CARD ── */
.card{
  background:var(--s1);border-radius:var(--radius);
  border:1px solid var(--border);overflow:hidden;cursor:pointer;
  transition:transform .2s,border-color .2s,box-shadow .2s;
  animation:cardIn .25s ease both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
.card:hover{
  transform:translateY(-4px) scale(1.015);
  border-color:rgba(232,25,44,.4);
  box-shadow:0 14px 40px rgba(0,0,0,.6),0 0 0 1px rgba(232,25,44,.12);
}
.card-thumb{position:relative;width:100%;aspect-ratio:2/3;background:var(--s2);overflow:hidden;}
.card-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s;display:block;}
.card:hover .card-thumb img{transform:scale(1.07);}
.thumb-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.8) 0%,transparent 55%);opacity:0;transition:.2s;}
.card:hover .thumb-overlay{opacity:1;}
.play-circle{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.7);
  width:52px;height:52px;border-radius:50%;
  background:rgba(232,25,44,.9);display:flex;align-items:center;justify-content:center;
  font-size:18px;opacity:0;transition:.2s;box-shadow:0 0 28px rgba(232,25,44,.6);
}
.card:hover .play-circle{opacity:1;transform:translate(-50%,-50%) scale(1);}
.card-year{
  position:absolute;top:8px;right:8px;
  background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.1);
  padding:2px 7px;border-radius:5px;font-size:10px;color:#ccc;font-weight:500;
}
.card-eps{
  position:absolute;top:8px;left:8px;
  background:rgba(232,25,44,.85);
  padding:2px 7px;border-radius:5px;font-size:10px;color:#fff;font-weight:600;
}
.no-thumb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:40px;opacity:.12;}
.card-body{padding:10px 12px 12px;}
.card-title{font-size:13px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-tags{margin-top:7px;display:flex;flex-wrap:wrap;gap:4px;}
.tag{font-size:10px;padding:2px 7px;border-radius:5px;background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--border);}
.tag.type{color:rgba(232,25,44,.9);border-color:rgba(232,25,44,.2);background:rgba(232,25,44,.06);}

/* ── SKELETON ── */
.skeleton{background:var(--s1);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;}
.skel-thumb{aspect-ratio:2/3;background:var(--s2);position:relative;overflow:hidden;}
.skel-thumb::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.04) 50%,transparent 100%);
  animation:shimmer 1.4s infinite;transform:translateX(-100%);
}
@keyframes shimmer{to{transform:translateX(100%);}}
.skel-body{padding:10px 12px 12px;}
.skel-line{height:12px;border-radius:4px;background:var(--s2);margin-bottom:8px;}
.skel-line:last-child{width:60%;margin-bottom:0;}

/* ── SPINNER (bottom) ── */
#pageSpinner{
  display:none;justify-content:center;align-items:center;gap:10px;
  padding:32px 0;color:var(--muted);font-size:13px;
}
#pageSpinner.show{display:flex;}
.ring{width:22px;height:22px;border:2px solid rgba(255,255,255,.07);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}

#allDone{text-align:center;padding:32px 0;color:var(--muted);font-size:13px;display:none;}
#sentinel{height:1px;}

/* ── MODAL ── */
#modal{
  position:fixed;inset:0;z-index:600;
  background:rgba(0,0,0,.94);backdrop-filter:blur(16px);
  display:none;align-items:flex-start;justify-content:center;
  overflow-y:auto;padding:20px;
}
#modal.open{display:flex;}
.modal-box{
  width:100%;max-width:1080px;background:var(--s1);
  border-radius:20px;border:1px solid var(--border);
  overflow:hidden;margin:auto;animation:mIn .2s ease;position:relative;
}
@keyframes mIn{from{opacity:0;transform:scale(.97);}to{opacity:1;transform:none;}}
.player-shell{position:relative;width:100%;aspect-ratio:16/9;background:#000;}
.player-shell video,.player-shell iframe{width:100%;height:100%;border:none;display:block;}
.player-msg{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:10px;color:var(--muted);font-size:14px;
}
.player-msg-icon{font-size:44px;opacity:.18;}
.modal-close{
  position:absolute;top:12px;right:12px;width:38px;height:38px;border:none;border-radius:50%;
  background:rgba(0,0,0,.6);color:var(--text);font-size:17px;cursor:pointer;z-index:10;
  display:flex;align-items:center;justify-content:center;transition:.15s;
}
.modal-close:hover{background:rgba(232,25,44,.7);}
.modal-info{padding:20px 24px 24px;}
.modal-title{font-family:var(--font-display);font-size:26px;letter-spacing:1px;line-height:1.2;padding-right:44px;}
.modal-badges{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;}
.mbadge{padding:4px 11px;border-radius:7px;font-size:12px;font-weight:500;background:var(--s2);color:var(--muted);border:1px solid var(--border);}
.mbadge.type{color:var(--red2);border-color:rgba(232,25,44,.25);background:rgba(232,25,44,.07);}
.mbadge.year{color:var(--gold);border-color:rgba(245,200,66,.2);background:rgba(245,200,66,.05);}
.modal-desc{margin-top:14px;font-size:14px;line-height:1.75;color:#888;max-height:80px;overflow:hidden;position:relative;transition:max-height .3s;}
.modal-desc.exp{max-height:400px;}
.desc-fade{position:absolute;bottom:0;left:0;right:0;height:36px;background:linear-gradient(to top,var(--s1),transparent);pointer-events:none;transition:.3s;}
.modal-desc.exp .desc-fade{opacity:0;}
.read-more{margin-top:6px;font-size:12px;color:var(--red2);cursor:pointer;background:none;border:none;padding:0;font-family:var(--font-body);}
.modal-sources{margin-top:16px;}
.sources-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.source-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.src-tab{
  padding:5px 14px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-family:var(--font-body);font-size:12px;font-weight:500;cursor:pointer;transition:.15s;
}
.src-tab:hover{color:var(--text);}
.src-tab.active{background:var(--s2);color:var(--text);border-color:rgba(255,255,255,.15);}
.ep-list{display:flex;flex-wrap:wrap;gap:5px;}
.ep-btn{
  padding:5px 12px;border-radius:7px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-family:var(--font-body);font-size:12px;cursor:pointer;transition:.15s;
  max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.ep-btn:hover{color:var(--text);}
.ep-btn.active{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 0 10px rgba(232,25,44,.3);}

@media(max-width:600px){
  :root{--card-w:155px;}
  .modal-title{font-size:20px;}
  .modal-info{padding:14px 16px 18px;}
  .count-badge{display:none;}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div class="topbar-inner">
    <div class="logo">AV<em>DB</em></div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Поиск…" autocomplete="off" spellcheck="false">
      <span class="search-icon">⌕</span>
    </div>
    <div class="topbar-right">
      <div class="count-badge" id="countBadge">—</div>
    </div>
  </div>
</div>

<!-- CATEGORY BAR -->
<div id="catBar">
  <div class="cat-inner" id="catInner">
    <button class="cat-btn active" data-cat="">Все</button>
  </div>
</div>

<!-- MAIN -->
<div id="app">
  <div id="grid"></div>
  <div id="pageSpinner"><div class="ring"></div><span id="spinTxt">Загрузка…</span></div>
  <div id="allDone">— Всё загружено —</div>
  <div id="sentinel"></div>
</div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="player-shell" id="playerShell">
      <div class="player-msg"><div class="player-msg-icon">▶</div><span>Выберите серию</span></div>
    </div>
    <div class="modal-info">
      <div class="modal-title" id="mTitle"></div>
      <div class="modal-badges" id="mBadges"></div>
      <div class="modal-desc" id="mDesc"><div class="desc-fade"></div></div>
      <button class="read-more" id="readMore" style="display:none">Читать далее ↓</button>
      <div class="modal-sources" id="mSources" style="display:none">
        <div class="sources-label">Серии</div>
        <div class="source-tabs" id="srcTabs"></div>
        <div class="ep-list" id="epList"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   CONFIG
══════════════════════════════════════ */
const API   = 'https://avdbapi.com/api.php/provide/vod';
const PG_SZ = 100;   // items per API page
const SKELS = 20;    // skeleton cards shown while loading

/* ══════════════════════════════════════
   STATE — page-by-page loading
   
   Strategy:
   - On load: fetch page 1, render cards, show sentinel
   - When sentinel enters viewport: fetch next page, append cards
   - Search/category: use ?ac=detail&wd=query or client-side filter
     on already-fetched pages; when reaching end of buffer fetch more
══════════════════════════════════════ */
let currentPage  = 0;      // last fetched API page
let totalPages   = null;   // set after first response
let isFetching   = false;
let allLoaded    = false;

// Buffer: all fetched videos (grows as pages come in)
let buffer       = [];

// Current view (after search/category filter)
let view         = [];
let viewOffset   = 0;      // how many view items rendered in DOM
const DOM_BATCH  = 40;     // cards appended per render tick

let activeCat    = '';
let searchQ      = '';
let searchTimer;

/* ══════════════════════════════════════
   DOM
══════════════════════════════════════ */
const grid        = document.getElementById('grid');
const pageSpinner = document.getElementById('pageSpinner');
const spinTxt     = document.getElementById('spinTxt');
const allDone     = document.getElementById('allDone');
const sentinel    = document.getElementById('sentinel');
const countBadge  = document.getElementById('countBadge');
const catInner    = document.getElementById('catInner');
const searchInput = document.getElementById('searchInput');

const modal       = document.getElementById('modal');
const modalClose  = document.getElementById('modalClose');
const playerShell = document.getElementById('playerShell');
const mTitle      = document.getElementById('mTitle');
const mBadges     = document.getElementById('mBadges');
const mDesc       = document.getElementById('mDesc');
const readMore    = document.getElementById('readMore');
const mSources    = document.getElementById('mSources');
const srcTabs     = document.getElementById('srcTabs');
const epList      = document.getElementById('epList');

/* ══════════════════════════════════════
   SKELETONS
══════════════════════════════════════ */
function showSkeletons(n = SKELS) {
  const frag = document.createDocumentFragment();
  for (let i = 0; i < n; i++) {
    const s = document.createElement('div');
    s.className = 'skeleton';
    s.innerHTML = `<div class="skel-thumb"></div>
      <div class="skel-body">
        <div class="skel-line" style="width:90%"></div>
        <div class="skel-line"></div>
      </div>`;
    frag.appendChild(s);
  }
  grid.appendChild(frag);
}
function removeSkeletons() {
  grid.querySelectorAll('.skeleton').forEach(s => s.remove());
}

/* ══════════════════════════════════════
   FETCH ONE PAGE
══════════════════════════════════════ */
async function fetchNextPage() {
  if (isFetching || allLoaded) return;
  if (totalPages !== null && currentPage >= totalPages) {
    allLoaded = true;
    finishLoad();
    return;
  }

  isFetching = true;
  pageSpinner.classList.add('show');
  spinTxt.textContent = totalPages
    ? `Страница ${currentPage + 1} из ${totalPages}…`
    : 'Загрузка…';

  const page = currentPage + 1;
  const url  = `${API}?ac=detail&pg=${page}&pagesize=${PG_SZ}`;

  try {
    const res  = await fetch(url);
    const data = await res.json();

    if (page === 1) {
      totalPages = data.pagecount || 1;
      removeSkeletons();
      buildCatsFromPage(data.list || []);
    }

    const list = data.list || [];
    buffer.push(...list);
    currentPage = page;

    countBadge.textContent = buffer.length.toLocaleString() + ' видео';

    // Apply current filter to new items and render
    applyFilterAndRender();

    if (currentPage >= totalPages) {
      allLoaded = true;
      finishLoad();
    }
  } catch (e) {
    console.error(e);
    // retry after 2s
    setTimeout(() => { isFetching = false; fetchNextPage(); }, 2000);
    return;
  }

  isFetching = false;
  pageSpinner.classList.remove('show');
}

function finishLoad() {
  pageSpinner.classList.remove('show');
  allDone.style.display = 'block';
  countBadge.textContent = buffer.length.toLocaleString() + ' видео';
}

/* ══════════════════════════════════════
   CATEGORIES — built from first page
   (later pages may add new types,
    but we don't re-sort on every page
    to avoid UI jumping)
══════════════════════════════════════ */
const catSeen = new Set();

function buildCatsFromPage(list) {
  let added = false;
  list.forEach(v => {
    const t = (v.type_name || '').trim();
    if (t && !catSeen.has(t)) {
      catSeen.add(t);
      catInner.appendChild(makeCatBtn(t));
      added = true;
    }
  });
}

function makeCatBtn(val) {
  const b = document.createElement('button');
  b.className = 'cat-btn';
  b.textContent = val;
  b.dataset.cat = val;
  b.onclick = () => {
    activeCat = val;
    document.querySelectorAll('.cat-btn').forEach(x => x.classList.toggle('active', x.dataset.cat === val));
    resetView();
  };
  return b;
}

// "All" button handler
catInner.querySelector('[data-cat=""]').onclick = () => {
  activeCat = '';
  document.querySelectorAll('.cat-btn').forEach(x => x.classList.toggle('active', x.dataset.cat === ''));
  resetView();
};

/* ══════════════════════════════════════
   FILTER + RENDER
══════════════════════════════════════ */
function resetView() {
  view       = filterBuffer();
  viewOffset = 0;
  grid.innerHTML = '';
  renderViewBatch();
}

function applyFilterAndRender() {
  // After new page fetched — extend view with newly matching items
  const newMatches = filterBuffer().slice(viewOffset + view.length);
  // Simpler: recompute full view but only append new cards
  const newView = filterBuffer();
  const toAdd   = newView.slice(view.length);
  view = newView;

  if (toAdd.length > 0) {
    const frag = document.createDocumentFragment();
    toAdd.forEach((v, i) => frag.appendChild(createCard(v, i)));
    grid.appendChild(frag);
    viewOffset = view.length;
  }
}

function filterBuffer() {
  const q = searchQ.toLowerCase();
  return buffer.filter(v => {
    const name = (v.vod_name || '').toLowerCase();
    const type = (v.type_name || '').trim();
    const matchS = !q || name.includes(q);
    const matchC = !activeCat || type === activeCat;
    return matchS && matchC;
  });
}

function renderViewBatch() {
  if (viewOffset >= view.length) {
    // No more in view but may have more pages
    if (!allLoaded) fetchNextPage();
    return;
  }
  const batch = view.slice(viewOffset, viewOffset + DOM_BATCH);
  const frag  = document.createDocumentFragment();
  batch.forEach((v, i) => frag.appendChild(createCard(v, i)));
  grid.appendChild(frag);
  viewOffset += batch.length;
}

/* ══════════════════════════════════════
   CARDS
══════════════════════════════════════ */
function createCard(v, i) {
  const name = v.vod_name  || 'Без названия';
  const pic  = v.vod_pic   || '';
  const year = v.vod_year  || '';
  const type = v.type_name || '';
  const tag  = v.vod_tag   || '';
  const eps  = parseEpisodes(v);

  const el = document.createElement('div');
  el.className = 'card';
  el.style.animationDelay = Math.min(i % DOM_BATCH * 12, 280) + 'ms';

  el.innerHTML = `
    <div class="card-thumb">
      ${pic
        ? `<img src="${esc(pic)}" loading="lazy" alt="" onerror="this.parentNode.innerHTML='<div class=no-thumb>🎬</div>'">`
        : '<div class="no-thumb">🎬</div>'}
      <div class="thumb-overlay"></div>
      <div class="play-circle">▶</div>
      ${year ? `<div class="card-year">${esc(year)}</div>` : ''}
      ${eps.length > 1 ? `<div class="card-eps">${eps.length} эп.</div>` : ''}
    </div>
    <div class="card-body">
      <div class="card-title">${esc(name)}</div>
      <div class="card-tags">
        ${type ? `<span class="tag type">${esc(type)}</span>` : ''}
        ${tag.split(',').slice(0,2).map(t=>t.trim()).filter(Boolean).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}
      </div>
    </div>`;

  el.addEventListener('click', () => openModal(v, eps));
  return el;
}

/* ══════════════════════════════════════
   PARSE EPISODES
   vod_play_from: "Src1$$$Src2"
   vod_play_url:  "Name$URL#Name$URL$$$Name$URL"
══════════════════════════════════════ */
function parseEpisodes(v) {
  const fromRaw = v.vod_play_from || '';
  const urlRaw  = v.vod_play_url  || '';
  if (!urlRaw.trim()) return [];

  const sources  = urlRaw.split('$$$');
  const srcNames = fromRaw.split('$$$');
  const result   = [];

  sources.forEach((block, si) => {
    const sname = (srcNames[si] || `Источник ${si+1}`).trim();
    block.split('#').filter(e => e.trim()).forEach((ep, ei) => {
      const parts = ep.split('$');
      const url   = parts.length >= 2 ? parts[parts.length-1].trim() : parts[0].trim();
      const name  = parts.length >= 2 ? parts.slice(0,-1).join('$').trim() : `Серия ${ei+1}`;
      if (url && /^https?:\/\//i.test(url)) result.push({ source:sname, name, url, si });
    });
  });

  return result;
}

/* ══════════════════════════════════════
   MODAL
══════════════════════════════════════ */
let hlsInst = null;

function openModal(v, eps) {
  const name = v.vod_name  || 'Без названия';
  const desc = stripHTML(v.vod_content || '').trim() || 'Описание отсутствует.';
  const year = v.vod_year  || '';
  const area = v.vod_area  || '';
  const lang = v.vod_lang  || '';
  const type = v.type_name || '';

  mTitle.textContent = name;

  mBadges.innerHTML = [
    type && `<span class="mbadge type">${esc(type)}</span>`,
    year && `<span class="mbadge year">${esc(year)}</span>`,
    area && `<span class="mbadge">${esc(area)}</span>`,
    lang && `<span class="mbadge">${esc(lang)}</span>`,
  ].filter(Boolean).join('');

  mDesc.innerHTML = esc(desc).replace(/\n/g,'<br>') + '<div class="desc-fade"></div>';
  if (desc.length > 180) {
    readMore.style.display = 'inline';
    readMore.textContent   = 'Читать далее ↓';
    mDesc.classList.remove('exp');
  } else {
    readMore.style.display = 'none';
    mDesc.classList.add('exp');
  }

  destroyPlayer();
  playerShell.innerHTML = `<div class="player-msg"><div class="player-msg-icon">▶</div><span>Выберите серию</span></div>`;

  if (!eps.length) {
    mSources.style.display = 'none';
  } else {
    mSources.style.display = 'block';

    // Group by source
    const srcMap = {};
    eps.forEach(e => { (srcMap[e.source] = srcMap[e.source] || []).push(e); });
    const srcKeys = Object.keys(srcMap);

    srcTabs.innerHTML = '';
    if (srcKeys.length > 1) {
      srcKeys.forEach((sk, i) => {
        const b = document.createElement('button');
        b.className = 'src-tab' + (i===0?' active':'');
        b.textContent = sk;
        b.onclick = () => {
          srcTabs.querySelectorAll('.src-tab').forEach(x=>x.classList.remove('active'));
          b.classList.add('active');
          renderEps(srcMap[sk]);
        };
        srcTabs.appendChild(b);
      });
    }

    renderEps(srcMap[srcKeys[0]]);
    playEp(eps[0]);
  }

  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderEps(eps) {
  epList.innerHTML = '';
  eps.forEach((ep, i) => {
    const b = document.createElement('button');
    b.className = 'ep-btn' + (i===0?' active':'');
    b.textContent = ep.name;
    b.title = ep.name;
    b.onclick = () => {
      epList.querySelectorAll('.ep-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      playEp(ep);
    };
    epList.appendChild(b);
  });
}

function playEp(ep) {
  destroyPlayer();
  playerShell.innerHTML = '';
  const type = /\.m3u8(\?|$)/i.test(ep.url) ? 'm3u8'
             : /\.(mp4|webm|ogg)(\?|$)/i.test(ep.url) ? 'direct'
             : 'embed';

  if (type === 'm3u8') {
    const vid = mkVideo();
    playerShell.appendChild(vid);
    if (Hls.isSupported()) {
      hlsInst = new Hls();
      hlsInst.loadSource(ep.url);
      hlsInst.attachMedia(vid);
      hlsInst.on(Hls.Events.ERROR, (_,d) => { if(d.fatal) showErr(ep.url); });
    } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
      vid.src = ep.url;
    } else {
      showErr(ep.url);
    }
  } else if (type === 'direct') {
    const vid = mkVideo();
    vid.src = ep.url;
    playerShell.appendChild(vid);
  } else {
    const f = document.createElement('iframe');
    f.src = ep.url;
    f.allowFullscreen = true;
    f.allow = 'autoplay; fullscreen; encrypted-media';
    f.referrerPolicy = 'origin';
    f.style.cssText = 'width:100%;height:100%;border:none;display:block;';
    playerShell.appendChild(f);
  }
}

function mkVideo() {
  const v = document.createElement('video');
  v.controls = true; v.autoplay = true;
  v.style.cssText = 'width:100%;height:100%;background:#000;display:block;';
  return v;
}

function showErr(url) {
  playerShell.innerHTML = `<div class="player-msg"><div class="player-msg-icon">⚠</div><span>Не удалось воспроизвести</span><a href="${esc(url)}" target="_blank" rel="noopener" style="color:var(--red2);font-size:12px;margin-top:4px;">Открыть напрямую ↗</a></div>`;
}

function destroyPlayer() {
  if (hlsInst) { hlsInst.destroy(); hlsInst = null; }
}

function closeModal() {
  destroyPlayer();
  modal.classList.remove('open');
  document.body.style.overflow = '';
  playerShell.innerHTML = '';
}

modalClose.addEventListener('click', closeModal);
modal.addEventListener('click', e => { if(e.target===modal) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

readMore.addEventListener('click', () => {
  const x = mDesc.classList.toggle('exp');
  readMore.textContent = x ? 'Свернуть ↑' : 'Читать далее ↓';
});

/* ══════════════════════════════════════
   SEARCH
══════════════════════════════════════ */
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQ = searchInput.value.trim();
    resetView();
    // If filtered view is small and there are more pages, keep fetching
    if (view.length < DOM_BATCH && !allLoaded) fetchNextPage();
  }, 250);
});

/* ══════════════════════════════════════
   INTERSECTION OBSERVER
   Watches sentinel at bottom of page.
   When visible:
   1. If there are buffered items not yet rendered → render next batch
   2. Else if API has more pages → fetch next page
══════════════════════════════════════ */
const io = new IntersectionObserver(entries => {
  if (!entries[0].isIntersecting) return;

  if (viewOffset < view.length) {
    renderViewBatch();
  } else if (!allLoaded && !isFetching) {
    fetchNextPage();
  }
}, { rootMargin: '500px' });

io.observe(sentinel);

/* ══════════════════════════════════════
   UTILS
══════════════════════════════════════ */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function stripHTML(h){ const d=document.createElement('div');d.innerHTML=h;return d.textContent||''; }

/* ══════════════════════════════════════
   BOOT
══════════════════════════════════════ */
showSkeletons(SKELS);
fetchNextPage();   // fetch only page 1
</script>
</body>
