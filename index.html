<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Player</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    align-items:flex-start;
    justify-content:center;
}

.video-wrapper{
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    position:relative;
}

.video-wrapper iframe{
    width:100%;
    height:100%;
    border:0;
    display:block;
}
</style>
</head>

<body>

<div class="video-wrapper">

</html>
