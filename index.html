<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video Player</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --bg:#050505;
    --accent:#ff0055;
}

html,
body{
    width:100%;
    min-height:100%;
    background:
        radial-gradient(circle at top, rgba(255,0,85,0.18), transparent 35%),
        radial-gradient(circle at bottom right, rgba(255,0,85,0.08), transparent 30%),
        var(--bg);
    overflow-x:hidden;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    padding:20px;
}

.page{
    width:100%;
    max-width:1400px;
}

.topbar{
    width:100%;
    display:flex;
    align-items:center;
    margin-bottom:18px;
    padding:14px 18px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-dot{
    width:14px;
    height:14px;
    background:var(--accent);
    box-shadow:
        0 0 10px var(--accent),
        0 0 30px var(--accent);
}

.logo h1{
    color:#fff;
    font-size:18px;
    font-weight:700;
    letter-spacing:1px;
}

.player-card{
    position:relative;
    overflow:hidden;
    background:#000;
    border:1px solid rgba(255,255,255,0.06);
    box-shadow:
        0 0 0 1px rgba(255,255,255,0.02),
        0 30px 80px rgba(0,0,0,0.7);
}

.player-card::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        linear-gradient(
            180deg,
            rgba(255,255,255,0.04),
            transparent 20%
        );
    pointer-events:none;
    z-index:1;
}

.video-wrapper{
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    position:relative;
}

.video-wrapper iframe{
    width:100%;
    height:100%;
    border:0;
    display:block;
}

@media(max-width:980px){

    body{
        padding:0;
    }

    .topbar{
        padding:14px;
        border-left:none;
        border-right:none;
    }

    .player-card{
        border-left:none;
        border-right:none;
    }
}
</style>
</head>

<body>

<div class="page">

    <div class="topbar">
        <div class="logo">
            <div class="logo-dot"></div>
            <h1>VIDEO PLAYER</h1>
        </div>
    </div>

    <div class="player-card">

        <div class="video-wrapper">

            <iframe
                src="https://www.eporner.com/embed/0ZNTJa1OAeV/"
                allowfullscreen>
            </iframe>

        </div>

    </div>

</div>

</body>
</html>
