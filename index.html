<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVDB — Video</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- HLS.js for m3u8 playback -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js"></script>
<style>
/* ══════════════════════════════════════════
   RESET & ROOT
══════════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#08080b;
  --s1:#0e0e13;
  --s2:#14141c;
  --border:rgba(255,255,255,.07);
  --red:#e8192c;
  --red2:#ff4d5e;
  --gold:#f5c842;
  --text:#ebebf0;
  --muted:#55556a;
  --font-display:'Bebas Neue',sans-serif;
  --font-body:'Outfit',sans-serif;
  --radius:14px;
  --card-w:220px;
}
html{scroll-behavior:smooth;}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

/* scanline texture */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9000;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);
}

/* ══════════════════════════════════════════
   LOADING SCREEN
══════════════════════════════════════════ */
#loadScreen{
  position:fixed;inset:0;z-index:8000;
  background:var(--bg);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:28px;
  transition:opacity .5s ease,visibility .5s ease;
}
#loadScreen.hidden{opacity:0;visibility:hidden;}

.load-logo{
  font-family:var(--font-display);
  font-size:72px;
  letter-spacing:6px;
  background:linear-gradient(135deg,var(--red),var(--red2),var(--gold));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}

.load-track{
  width:320px;height:3px;
  background:rgba(255,255,255,.08);
  border-radius:999px;
  overflow:hidden;
}
.load-fill{
  height:100%;
  background:linear-gradient(90deg,var(--red),var(--red2));
  border-radius:999px;
  width:0%;
  transition:width .4s ease;
  box-shadow:0 0 12px var(--red);
}
.load-text{font-size:13px;color:var(--muted);letter-spacing:.05em;}

/* ══════════════════════════════════════════
   TOPBAR
══════════════════════════════════════════ */
#topbar{
  position:sticky;top:0;z-index:500;
  background:rgba(8,8,11,.88);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.topbar-inner{
  max-width:1800px;margin:0 auto;
  padding:0 20px;height:58px;
  display:flex;align-items:center;gap:16px;
}
.logo{
  font-family:var(--font-display);
  font-size:28px;letter-spacing:3px;
  color:var(--red);
  flex-shrink:0;
  text-shadow:0 0 20px rgba(232,25,44,.5);
}
.logo em{color:var(--text);font-style:normal;}

/* search */
.search-box{
  flex:1;max-width:480px;
  position:relative;
}
.search-box input{
  width:100%;height:38px;
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:0 38px 0 14px;
  color:var(--text);
  font-family:var(--font-body);font-size:14px;
  outline:none;transition:.2s;
}
.search-box input::placeholder{color:var(--muted);}
.search-box input:focus{border-color:rgba(232,25,44,.5);background:rgba(255,255,255,.04);}
.search-icon{
  position:absolute;right:11px;top:50%;
  transform:translateY(-50%);
  color:var(--muted);font-size:16px;pointer-events:none;
}
.topbar-count{
  margin-left:auto;font-size:12px;color:var(--muted);
  flex-shrink:0;font-variant-numeric:tabular-nums;
  white-space:nowrap;
}

/* ══════════════════════════════════════════
   CATEGORY BAR
══════════════════════════════════════════ */
#catBar{
  position:sticky;top:58px;z-index:490;
  background:rgba(8,8,11,.9);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 20px;
  overflow-x:auto;
  scrollbar-width:none;
}
#catBar::-webkit-scrollbar{display:none;}
.cat-inner{
  max-width:1800px;margin:0 auto;
  display:flex;align-items:center;gap:6px;
  height:44px;width:max-content;min-width:100%;
}
.cat-btn{
  padding:6px 16px;height:30px;
  border-radius:999px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--muted);
  font-family:var(--font-body);font-size:12px;font-weight:500;
  cursor:pointer;transition:.15s;white-space:nowrap;
  display:flex;align-items:center;
}
.cat-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2);}
.cat-btn.active{
  background:var(--red);border-color:var(--red);
  color:#fff;
  box-shadow:0 0 14px rgba(232,25,44,.4);
}

/* ══════════════════════════════════════════
   MAIN LAYOUT
══════════════════════════════════════════ */
#app{max-width:1800px;margin:0 auto;padding:20px 20px 80px;}

/* ══════════════════════════════════════════
   GRID
══════════════════════════════════════════ */
#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(var(--card-w),1fr));
  gap:14px;
}

/* ══════════════════════════════════════════
   CARD
══════════════════════════════════════════ */
.card{
  background:var(--s1);
  border-radius:var(--radius);
  border:1px solid var(--border);
  overflow:hidden;cursor:pointer;
  transition:transform .2s ease,border-color .2s,box-shadow .2s;
  animation:cardIn .25s ease both;
  position:relative;
}
@keyframes cardIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.card:hover{
  transform:translateY(-4px) scale(1.015);
  border-color:rgba(232,25,44,.4);
  box-shadow:0 14px 40px rgba(0,0,0,.6),0 0 0 1px rgba(232,25,44,.15);
  z-index:2;
}

/* thumb */
.card-thumb{
  position:relative;
  width:100%;aspect-ratio:2/3;  /* poster ratio */
  background:var(--s2);overflow:hidden;
}
.card-thumb img{
  width:100%;height:100%;object-fit:cover;
  transition:transform .3s ease;
  display:block;
}
.card:hover .card-thumb img{transform:scale(1.07);}

.card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.1) 50%,transparent 100%);
  opacity:0;transition:.2s;
}
.card:hover .card-overlay{opacity:1;}

.play-circle{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.7);
  width:56px;height:56px;border-radius:50%;
  background:rgba(232,25,44,.9);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;opacity:0;transition:.2s;
  box-shadow:0 0 30px rgba(232,25,44,.7);
}
.card:hover .play-circle{opacity:1;transform:translate(-50%,-50%) scale(1);}

.card-year{
  position:absolute;top:8px;right:8px;
  background:rgba(0,0,0,.7);
  border:1px solid rgba(255,255,255,.1);
  padding:2px 7px;border-radius:5px;
  font-size:10px;color:#ccc;font-weight:500;
}
.card-eps{
  position:absolute;top:8px;left:8px;
  background:rgba(232,25,44,.85);
  padding:2px 7px;border-radius:5px;
  font-size:10px;color:#fff;font-weight:600;
}

.no-thumb{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:42px;opacity:.15;
}

/* card body */
.card-body{padding:10px 12px 12px;}
.card-title{
  font-size:13px;font-weight:600;
  line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}
.card-tags{
  margin-top:7px;display:flex;flex-wrap:wrap;gap:4px;
}
.tag{
  font-size:10px;padding:2px 7px;border-radius:5px;
  background:rgba(255,255,255,.04);color:var(--muted);
  border:1px solid var(--border);
}
.tag.type{color:rgba(232,25,44,.9);border-color:rgba(232,25,44,.2);background:rgba(232,25,44,.06);}

/* ══════════════════════════════════════════
   LOADER / EMPTY
══════════════════════════════════════════ */
#spinner{
  display:flex;flex-direction:column;align-items:center;
  padding:50px 0;gap:14px;
}
.ring{
  width:44px;height:44px;
  border:3px solid rgba(255,255,255,.07);
  border-top-color:var(--red);
  border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner-txt{font-size:13px;color:var(--muted);}

#sentinel{height:2px;}
#empty{
  text-align:center;padding:80px 20px;
  color:var(--muted);font-size:15px;display:none;
}

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
#modal{
  position:fixed;inset:0;z-index:600;
  background:rgba(0,0,0,.94);
  backdrop-filter:blur(16px);
  display:none;align-items:flex-start;justify-content:center;
  overflow-y:auto;padding:20px;
}
#modal.open{display:flex;}

.modal-box{
  width:100%;max-width:1080px;
  background:var(--s1);
  border-radius:20px;
  border:1px solid var(--border);
  overflow:hidden;
  margin:auto;
  animation:mIn .2s ease;
  position:relative;
}
@keyframes mIn{from{opacity:0;transform:scale(.97);}to{opacity:1;transform:scale(1);}}

/* video player */
.player-shell{
  position:relative;
  width:100%;aspect-ratio:16/9;
  background:#000;
}
.player-shell video,
.player-shell iframe{
  width:100%;height:100%;border:none;display:block;
}
.player-msg{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:12px;color:var(--muted);font-size:15px;
}
.player-msg-icon{font-size:48px;opacity:.2;}

/* close */
.modal-close{
  position:absolute;top:12px;right:12px;
  width:38px;height:38px;border:none;border-radius:50%;
  background:rgba(0,0,0,.6);color:var(--text);
  font-size:17px;cursor:pointer;z-index:10;
  display:flex;align-items:center;justify-content:center;
  transition:.15s;
}
.modal-close:hover{background:rgba(232,25,44,.7);}

/* info section */
.modal-info{padding:20px 24px 24px;}
.modal-title{
  font-family:var(--font-display);
  font-size:26px;letter-spacing:1px;
  line-height:1.2;padding-right:44px;
}
.modal-badges{margin-top:10px;display:flex;flex-wrap:wrap;gap:6px;}
.mbadge{
  padding:4px 11px;border-radius:7px;
  font-size:12px;font-weight:500;
  background:var(--s2);color:var(--muted);
  border:1px solid var(--border);
}
.mbadge.type{color:var(--red2);border-color:rgba(232,25,44,.25);background:rgba(232,25,44,.07);}
.mbadge.year{color:var(--gold);border-color:rgba(245,200,66,.2);background:rgba(245,200,66,.05);}

.modal-desc{
  margin-top:14px;font-size:14px;line-height:1.75;
  color:#888;max-height:100px;overflow:hidden;
  position:relative;transition:max-height .3s;
}
.modal-desc.expanded{max-height:500px;}
.desc-fade{
  position:absolute;bottom:0;left:0;right:0;height:40px;
  background:linear-gradient(to top,var(--s1),transparent);
  pointer-events:none;transition:.3s;
}
.modal-desc.expanded .desc-fade{opacity:0;}
.read-more{
  margin-top:6px;font-size:12px;color:var(--red2);
  cursor:pointer;background:none;border:none;padding:0;
  font-family:var(--font-body);
}
.read-more:hover{text-decoration:underline;}

/* sources & episodes */
.modal-sources{margin-top:16px;}
.sources-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.source-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.src-tab{
  padding:5px 14px;border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--muted);
  font-family:var(--font-body);font-size:12px;font-weight:500;
  cursor:pointer;transition:.15s;
}
.src-tab:hover{color:var(--text);}
.src-tab.active{background:var(--s2);color:var(--text);border-color:rgba(255,255,255,.15);}

.ep-list{display:flex;flex-wrap:wrap;gap:5px;}
.ep-btn{
  padding:5px 12px;border-radius:7px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--muted);
  font-family:var(--font-body);font-size:12px;
  cursor:pointer;transition:.15s;
  max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.ep-btn:hover{color:var(--text);border-color:rgba(255,255,255,.2);}
.ep-btn.active{
  background:var(--red);border-color:var(--red);color:#fff;
  box-shadow:0 0 10px rgba(232,25,44,.3);
}

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media(max-width:600px){
  :root{--card-w:155px;}
  .modal-title{font-size:20px;}
  .modal-info{padding:14px 16px 18px;}
  .topbar-count{display:none;}
}
@media(max-width:380px){
  :root{--card-w:145px;}
}
</style>
</head>
<body>

<!-- ── LOADING SCREEN ── -->
<div id="loadScreen">
  <div class="load-logo">AVDB</div>
  <div class="load-track"><div class="load-fill" id="loadFill"></div></div>
  <div class="load-text" id="loadText">Подключение к API…</div>
</div>

<!-- ── TOPBAR ── -->
<div id="topbar">
  <div class="topbar-inner">
    <div class="logo">AV<em>DB</em></div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Поиск по названию…" autocomplete="off" spellcheck="false">
      <span class="search-icon">⌕</span>
    </div>
    <div class="topbar-count" id="topCount">—</div>
  </div>
</div>

<!-- ── CATEGORY BAR ── -->
<div id="catBar">
  <div class="cat-inner" id="catInner">
    <button class="cat-btn active" data-cat="">Все</button>
  </div>
</div>

<!-- ── MAIN ── -->
<div id="app">
  <div id="grid"></div>
  <div id="spinner">
    <div class="ring"></div>
    <div class="spinner-txt" id="spinTxt">Загрузка…</div>
  </div>
  <div id="empty">Ничего не найдено 🎬</div>
  <div id="sentinel"></div>
</div>

<!-- ── MODAL ── -->
<div id="modal">
  <div class="modal-box" id="modalBox">
    <button class="modal-close" id="modalClose" title="Закрыть">✕</button>

    <div class="player-shell" id="playerShell">
      <div class="player-msg">
        <div class="player-msg-icon">▶</div>
        <span>Выберите серию для просмотра</span>
      </div>
    </div>

    <div class="modal-info">
      <div class="modal-title" id="mTitle"></div>
      <div class="modal-badges" id="mBadges"></div>
      <div class="modal-desc" id="mDesc">
        <div class="desc-fade"></div>
      </div>
      <button class="read-more" id="readMore" style="display:none">Читать далее ↓</button>

      <div class="modal-sources" id="mSources" style="display:none">
        <div class="sources-label">Источники / Серии</div>
        <div class="source-tabs" id="srcTabs"></div>
        <div class="ep-list" id="epList"></div>
      </div>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   CONSTANTS & STATE
══════════════════════════════════════════ */
const API_BASE = 'https://avdbapi.com/api.php/provide/vod';
const PAGE_SIZE = 100;       // API fetch page size
const RENDER_BATCH = 40;     // cards per IntersectionObserver tick

let allVideos   = [];   // all fetched
let filtered    = [];   // after search + category
let rendered    = 0;    // how many cards in DOM
let activecat   = '';
let searchQ     = '';
let hlsInstance = null;

/* ══════════════════════════════════════════
   DOM REFS
══════════════════════════════════════════ */
const loadScreen = document.getElementById('loadScreen');
const loadFill   = document.getElementById('loadFill');
const loadText   = document.getElementById('loadText');
const grid       = document.getElementById('grid');
const spinner    = document.getElementById('spinner');
const spinTxt    = document.getElementById('spinTxt');
const topCount   = document.getElementById('topCount');
const empty      = document.getElementById('empty');
const sentinel   = document.getElementById('sentinel');
const catInner   = document.getElementById('catInner');
const searchInput= document.getElementById('searchInput');

const modal      = document.getElementById('modal');
const modalClose = document.getElementById('modalClose');
const playerShell= document.getElementById('playerShell');
const mTitle     = document.getElementById('mTitle');
const mBadges    = document.getElementById('mBadges');
const mDesc      = document.getElementById('mDesc');
const readMore   = document.getElementById('readMore');
const mSources   = document.getElementById('mSources');
const srcTabs    = document.getElementById('srcTabs');
const epList     = document.getElementById('epList');

/* ══════════════════════════════════════════
   API — PARSE EPISODES
   
   API response fields we care about:
     vod_name       — title
     vod_pic        — poster image URL
     vod_content    — description (HTML stripped on display)
     vod_area       — country/region
     vod_year       — year
     vod_lang       — language
     type_name      — category name
     vod_tag        — tags (comma separated)
     vod_play_from  — source names separated by $$$
                      e.g. "云播线路1$$$云播线路2"
     vod_play_url   — play URLs matching sources separated by $$$
                      within each source: episodes separated by #
                      each episode: "Title$URL"  or just "URL"
══════════════════════════════════════════ */
function parseEpisodes(v) {
  const fromRaw = v.vod_play_from || '';
  const urlRaw  = v.vod_play_url  || '';
  if (!urlRaw.trim()) return [];

  const sources  = urlRaw.split('$$$');
  const srcNames = fromRaw.split('$$$');
  const result   = [];

  sources.forEach((block, si) => {
    const sname = (srcNames[si] || `Источник ${si+1}`).trim();
    const eps   = block.split('#').filter(e => e.trim());

    eps.forEach((ep, ei) => {
      const parts = ep.split('$');
      const url   = parts.length >= 2
        ? parts[parts.length - 1].trim()
        : parts[0].trim();
      const name  = parts.length >= 2
        ? parts.slice(0, -1).join('$').trim()
        : `Серия ${ei + 1}`;

      if (url && url.startsWith('http')) {
        result.push({ source: sname, name, url, si });
      }
    });
  });

  return result;
}

/* Strip HTML tags from description */
function stripHTML(html) {
  const d = document.createElement('div');
  d.innerHTML = html || '';
  return d.textContent || d.innerText || '';
}

/* Detect URL type */
function urlType(url) {
  if (/\.m3u8(\?|$)/i.test(url)) return 'm3u8';
  if (/\.(mp4|webm|ogg)(\?|$)/i.test(url)) return 'direct';
  return 'embed'; // treat as iframe embed
}

/* ══════════════════════════════════════════
   FETCH ALL VIDEOS
══════════════════════════════════════════ */
async function fetchAll() {
  let page = 1;
  let total = 1;

  while (page <= total) {
    const url = `${API_BASE}?ac=detail&pg=${page}&pagesize=${PAGE_SIZE}`;
    try {
      const res  = await fetch(url);
      const data = await res.json();

      if (data.list && data.list.length) {
        allVideos.push(...data.list);
      }

      if (page === 1) {
        total = data.pagecount || 1;
        buildCats();
      }

      const pct = Math.min(97, Math.round((page / total) * 100));
      loadFill.style.width = pct + '%';
      loadText.textContent = `Загружено ${allVideos.length.toLocaleString()} из ~${(total * PAGE_SIZE).toLocaleString()} видео…`;
      topCount.textContent = allVideos.length.toLocaleString() + ' видео';

      // Incremental render every 10 pages or first page
      if (page % 10 === 0 || page === 1 || page === total) {
        applyFilter();
      }

      page++;
    } catch(e) {
      console.error('Page', page, e);
      await sleep(2000);
      // retry
      page++;
    }
  }

  // Done
  loadFill.style.width = '100%';
  await sleep(400);
  loadScreen.classList.add('hidden');
  spinner.style.display = 'none';
  topCount.textContent = allVideos.length.toLocaleString() + ' видео';
  buildCats();
  applyFilter();
}

function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

/* ══════════════════════════════════════════
   CATEGORIES
══════════════════════════════════════════ */
function buildCats() {
  const counts = {};
  allVideos.forEach(v => {
    const t = (v.type_name || '').trim();
    if (t) counts[t] = (counts[t] || 0) + 1;
  });

  const top = Object.entries(counts)
    .sort((a,b) => b[1] - a[1])
    .slice(0, 16)
    .map(([t]) => t);

  // Clear existing (except "All")
  catInner.innerHTML = '';
  const allBtn = makeBtn('Все', '');
  catInner.appendChild(allBtn);
  top.forEach(t => catInner.appendChild(makeBtn(t, t)));
}

function makeBtn(label, val) {
  const b = document.createElement('button');
  b.className = 'cat-btn' + (val === activecat ? ' active' : '');
  b.textContent = label;
  b.dataset.cat = val;
  b.onclick = () => {
    activecat = val;
    document.querySelectorAll('.cat-btn').forEach(x => x.classList.toggle('active', x.dataset.cat === val));
    applyFilter();
  };
  return b;
}

/* ══════════════════════════════════════════
   FILTER
══════════════════════════════════════════ */
function applyFilter() {
  const q = searchQ.toLowerCase();

  filtered = allVideos.filter(v => {
    const name = (v.vod_name || '').toLowerCase();
    const type = (v.type_name || '').trim();
    const matchSearch = !q || name.includes(q);
    const matchCat    = !activecat || type === activecat;
    return matchSearch && matchCat;
  });

  rendered = 0;
  grid.innerHTML = '';
  empty.style.display = filtered.length ? 'none' : 'block';
  renderBatch();
}

/* ══════════════════════════════════════════
   RENDER BATCH
══════════════════════════════════════════ */
function renderBatch() {
  if (rendered >= filtered.length) return;
  const batch = filtered.slice(rendered, rendered + RENDER_BATCH);
  const frag  = document.createDocumentFragment();

  batch.forEach((v, i) => {
    frag.appendChild(createCard(v, i));
  });

  grid.appendChild(frag);
  rendered += batch.length;
}

/* ══════════════════════════════════════════
   CREATE CARD
══════════════════════════════════════════ */
function createCard(v, animIdx) {
  const name  = v.vod_name   || 'Без названия';
  const pic   = v.vod_pic    || '';
  const year  = v.vod_year   || '';
  const type  = v.type_name  || '';
  const tag   = v.vod_tag    || '';
  const eps   = parseEpisodes(v);

  const el = document.createElement('div');
  el.className = 'card';
  el.style.animationDelay = Math.min(animIdx % RENDER_BATCH * 15, 300) + 'ms';

  const epsLabel = eps.length > 1 ? `${eps.length} эп.` : '';

  el.innerHTML = `
    <div class="card-thumb">
      ${pic
        ? `<img src="${escH(pic)}" loading="lazy" alt="${escH(name)}" onerror="this.parentNode.innerHTML='<div class=no-thumb>🎬</div>'">`
        : '<div class="no-thumb">🎬</div>'
      }
      <div class="card-overlay"></div>
      <div class="play-circle">▶</div>
      ${year    ? `<div class="card-year">${escH(year)}</div>` : ''}
      ${epsLabel? `<div class="card-eps">${epsLabel}</div>` : ''}
    </div>
    <div class="card-body">
      <div class="card-title">${escH(name)}</div>
      <div class="card-tags">
        ${type ? `<span class="tag type">${escH(type)}</span>` : ''}
        ${tag.split(',').slice(0,2).map(t=>t.trim()).filter(Boolean).map(t=>`<span class="tag">${escH(t)}</span>`).join('')}
      </div>
    </div>
  `;

  el.addEventListener('click', () => openModal(v, eps));
  return el;
}

function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ══════════════════════════════════════════
   OPEN MODAL
══════════════════════════════════════════ */
function openModal(v, eps) {
  const name = v.vod_name  || 'Без названия';
  const desc = stripHTML(v.vod_content || '').trim() || 'Описание отсутствует.';
  const year = v.vod_year  || '';
  const area = v.vod_area  || '';
  const lang = v.vod_lang  || '';
  const type = v.type_name || '';

  mTitle.textContent = name;

  // badges
  const badgeData = [
    type ? {label:type, cls:'type'} : null,
    year ? {label:year, cls:'year'} : null,
    area ? {label:area, cls:''} : null,
    lang ? {label:lang, cls:''} : null,
  ].filter(Boolean);
  mBadges.innerHTML = badgeData.map(b=>`<span class="mbadge ${b.cls}">${escH(b.label)}</span>`).join('');

  // description
  mDesc.innerHTML = escH(desc).replace(/\n/g,'<br>') + '<div class="desc-fade"></div>';
  if (desc.length > 200) {
    readMore.style.display = 'inline';
    readMore.textContent   = 'Читать далее ↓';
    mDesc.classList.remove('expanded');
  } else {
    readMore.style.display = 'none';
    mDesc.classList.add('expanded');
  }

  // player — reset
  destroyPlayer();
  playerShell.innerHTML = `<div class="player-msg"><div class="player-msg-icon">▶</div><span>Выберите серию для просмотра</span></div>`;

  // sources / episodes
  if (eps.length === 0) {
    mSources.style.display = 'none';
  } else {
    mSources.style.display = 'block';

    // Group by source
    const sourceMap = {};
    eps.forEach(e => {
      if (!sourceMap[e.source]) sourceMap[e.source] = [];
      sourceMap[e.source].push(e);
    });
    const sourceNames = Object.keys(sourceMap);

    // Source tabs (only if > 1 source)
    srcTabs.innerHTML = '';
    if (sourceNames.length > 1) {
      sourceNames.forEach((sname, i) => {
        const btn = document.createElement('button');
        btn.className = 'src-tab' + (i===0 ? ' active' : '');
        btn.textContent = sname;
        btn.onclick = () => {
          document.querySelectorAll('.src-tab').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
          renderEpButtons(sourceMap[sname]);
        };
        srcTabs.appendChild(btn);
      });
    }

    // Render episodes for first source
    renderEpButtons(sourceMap[sourceNames[0]], eps.length === 1);

    // Auto-play first episode
    playEpisode(eps[0]);
  }

  modal.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderEpButtons(episodes, autoFirst = false) {
  epList.innerHTML = '';
  episodes.forEach((ep, i) => {
    const btn = document.createElement('button');
    btn.className = 'ep-btn' + (i === 0 ? ' active' : '');
    btn.textContent = ep.name;
    btn.title = ep.name;
    btn.onclick = () => {
      document.querySelectorAll('.ep-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      playEpisode(ep);
    };
    epList.appendChild(btn);
  });
}

/* ══════════════════════════════════════════
   PLAYER
══════════════════════════════════════════ */
function destroyPlayer() {
  if (hlsInstance) {
    hlsInstance.destroy();
    hlsInstance = null;
  }
}

function playEpisode(ep) {
  destroyPlayer();
  playerShell.innerHTML = '';

  const type = urlType(ep.url);

  if (type === 'm3u8') {
    const video = document.createElement('video');
    video.controls  = true;
    video.autoplay  = true;
    video.style.cssText = 'width:100%;height:100%;background:#000;display:block;';
    playerShell.appendChild(video);

    if (Hls.isSupported()) {
      hlsInstance = new Hls({ enableWorker: false });
      hlsInstance.loadSource(ep.url);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) showPlayerError(ep.url);
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = ep.url;
    } else {
      showPlayerError(ep.url);
    }

  } else if (type === 'direct') {
    const video = document.createElement('video');
    video.src    = ep.url;
    video.controls = true;
    video.autoplay = true;
    video.style.cssText = 'width:100%;height:100%;background:#000;display:block;';
    playerShell.appendChild(video);

  } else {
    // embed iframe
    const iframe = document.createElement('iframe');
    iframe.src   = ep.url;
    iframe.allowFullscreen = true;
    iframe.allow = 'autoplay; fullscreen; encrypted-media';
    iframe.referrerPolicy = 'origin';
    iframe.style.cssText = 'width:100%;height:100%;border:none;display:block;';
    playerShell.appendChild(iframe);
  }
}

function showPlayerError(url) {
  playerShell.innerHTML = `
    <div class="player-msg">
      <div class="player-msg-icon">⚠</div>
      <span>Не удалось воспроизвести</span>
      <a href="${escH(url)}" target="_blank" rel="noopener"
         style="color:var(--red2);font-size:12px;margin-top:4px;">
        Открыть напрямую ↗
      </a>
    </div>`;
}

/* ══════════════════════════════════════════
   CLOSE MODAL
══════════════════════════════════════════ */
function closeModal() {
  destroyPlayer();
  modal.classList.remove('open');
  document.body.style.overflow = '';
  playerShell.innerHTML = '';
}

modalClose.addEventListener('click', closeModal);
modal.addEventListener('click', e => { if(e.target === modal) closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

/* ══════════════════════════════════════════
   READ MORE
══════════════════════════════════════════ */
readMore.addEventListener('click', () => {
  const expanded = mDesc.classList.toggle('expanded');
  readMore.textContent = expanded ? 'Свернуть ↑' : 'Читать далее ↓';
});

/* ══════════════════════════════════════════
   SEARCH
══════════════════════════════════════════ */
let searchTimer;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQ = searchInput.value.trim();
    applyFilter();
  }, 220);
});

/* ══════════════════════════════════════════
   INFINITE SCROLL
══════════════════════════════════════════ */
const io = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting) renderBatch();
}, { rootMargin: '400px' });
io.observe(sentinel);

/* ══════════════════════════════════════════
   BOOT
══════════════════════════════════════════ */
fetchAll();
</script>
