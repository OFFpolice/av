<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EPORNER</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* ── Main app shell ── */
        .app {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            height: var(--tg-viewport-height, 100vh);
            display: flex;
            flex-direction: column;
            background: #000;
        }

        /* ── Header ── */
        .header {
            padding: calc(var(--safe-top, 0px) + 13px) 16px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 12px;
            color: #fff;
        }
        .search-container { display: flex; gap: 10px; }
        .input-wrapper { position: relative; flex: 1; }
        #searchInput {
            width: 100%;
            padding: 14px 40px 14px 16px;
            border: none;
            border-radius: 14px;
            background: #1a1a1a;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        #searchInput::placeholder { color: #888; }
        .clear-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #444;
            color: #fff;
            font-size: 18px;
            line-height: 24px;
            text-align: center;
            cursor: pointer;
            display: none;
            user-select: none;
            transition: background 0.2s;
        }
        .clear-btn:hover  { background: #666; }
        .clear-btn:active { background: #888; }
        #searchBtn {
            padding: 14px 24px;
            border: none;
            border-radius: 14px;
            background: #e50914;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        #searchBtn:active   { opacity: 0.7; }
        #searchBtn:disabled { opacity: 0.5; pointer-events: none; }

        /* ── Scrollable content ── */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px calc(var(--safe-bottom, 0px) + 20px);
            scroll-behavior: smooth;
        }
        .videos-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }

        /* ── Video card ── */
        .video-card {
            background: #111;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .video-card:active { transform: scale(0.98); }
        .video-thumb {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            background: #222;
            display: block;
        }
        .video-info {
            padding: 12px 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .video-title {
            font-size: 14px;
            line-height: 1.4;
            font-weight: 500;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .video-link {
            display: inline-block;
            padding: 8px 12px;
            background: #e50914;
            color: #fff;
            text-decoration: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            margin-top: auto;
            border: none;
            cursor: pointer;
        }
        .video-link:active { opacity: 0.75; }

        /* ── Status messages ── */
        .status-message {
            text-align: center;
            padding: 24px 16px;
            color: #aaa;
            font-size: 15px;
        }
        .error-message { color: #ff4d4d; }
        .hidden { display: none !important; }
        .loader { text-align: center; padding: 20px; color: #aaa; }
        .loader::after {
            content: "";
            display: inline-block;
            width: 20px; height: 20px;
            margin-left: 8px;
            border: 2px solid #aaa;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ══════════════════════════════════════
           Modal Player
           Slides in from the right as a full
           screen "page" — same visual language
        ══════════════════════════════════════ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: #000;
            display: flex;
            justify-content: center;
            transform: translateX(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }
        .modal-overlay.active {
            transform: translateX(0);
            pointer-events: all;
        }

        /* Same max-width + column layout as .app */
        .modal-inner {
            width: 100%;
            max-width: 480px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #000;
        }

        /* Modal "header" — identical rules to .header */
        .modal-header {
            padding: calc(var(--safe-top, 0px) + 13px) 16px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /*
         * In-app back button — shown only when
         * tg.BackButton is NOT available (e.g. desktop / debug).
         * Same pill shape + bg as #searchInput field.
         */
        .modal-back {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 14px;
            background: #1a1a1a;
            color: #fff;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .modal-back:active { background: #2a2a2a; }
        .modal-back.hidden { display: none; }

        .modal-header-title {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Modal scrollable body — same as .content */
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px calc(var(--safe-bottom, 0px) + 20px);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Player card — same as .video-card */
        .modal-player-card {
            background: #111;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }
        .modal-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }
        .modal-player iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        /* Title card — same as .video-info */
        .modal-title-card {
            background: #111;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            padding: 14px;
            flex-shrink: 0;
        }
        .modal-title {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <!-- ── Main app ── -->
    <div id="app" class="app">
        <header class="header">
            <h1>EPORNER</h1>
            <div class="search-container">
                <div class="input-wrapper">
                    <input type="text" id="searchInput" placeholder="Search videos..." autocomplete="off">
                    <span class="clear-btn" id="clearBtn">✕</span>
                </div>
                <button id="searchBtn">Search</button>
            </div>
        </header>

        <main class="content" id="content">
            <div id="videosGrid" class="videos-grid"></div>
            <div id="initialMessage"   class="status-message hidden">Enter a query to start searching</div>
            <div id="loadingIndicator" class="loader hidden">Loading</div>
            <div id="noResultsMessage" class="status-message hidden">No videos found</div>
            <div id="errorMessage"     class="status-message error-message hidden">Something went wrong. Try again.</div>
            <div id="endMessage"       class="status-message hidden">You've reached the end</div>
        </main>
    </div>

    <!-- ── Modal Player ── -->
    <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
        <div class="modal-inner">

            <div class="modal-header">
                <!-- Visible only when tg.BackButton is unavailable -->
                <button class="modal-back hidden" id="modalBack" aria-label="Back">‹</button>
                <span class="modal-header-title">Now Playing</span>
            </div>

            <div class="modal-body">
                <div class="modal-player-card">
                    <div class="modal-player" id="modalPlayer"></div>
                </div>
                <div class="modal-title-card">
                    <div class="modal-title" id="modalTitle"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
    (function () {
        /* ── Telegram SDK ── */
        const tg = window.Telegram?.WebApp;
        const hasTg = !!(tg?.initData);

        if (hasTg) {
            tg.ready();
            tg.expand();
            if (tg.isVersionAtLeast('8.0')) tg.requestFullscreen();
            tg.lockOrientation();
            tg.disableVerticalSwipes();
            tg.enableClosingConfirmation();
        }

        /* ── Safe-area CSS variables ── */
        function applySafeAreas() {
            // Try newer safeAreaInset first, fall back to CSS env()
            const top    = tg?.safeAreaInset?.top    ?? tg?.contentSafeAreaInset?.top    ?? 0;
            const bottom = tg?.safeAreaInset?.bottom ?? tg?.contentSafeAreaInset?.bottom ?? 0;
            document.documentElement.style.setProperty('--safe-top',    top    + 'px');
            document.documentElement.style.setProperty('--safe-bottom', bottom + 'px');
        }
        applySafeAreas();
        if (hasTg) tg.onEvent('safeAreaChanged', applySafeAreas);

        /* ── Viewport height ── */
        function setViewportHeight() {
            if (hasTg) document.documentElement.style.setProperty(
                '--tg-viewport-height', tg.viewportStableHeight + 'px'
            );
        }
        setViewportHeight();
        if (hasTg) tg.onEvent('viewportChanged', setViewportHeight);

        /* ── DOM refs ── */
        const searchInput      = document.getElementById('searchInput');
        const searchBtn        = document.getElementById('searchBtn');
        const clearBtn         = document.getElementById('clearBtn');
        const contentEl        = document.getElementById('content');
        const videosGrid       = document.getElementById('videosGrid');
        const initialMessage   = document.getElementById('initialMessage');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const noResultsMessage = document.getElementById('noResultsMessage');
        const errorMessage     = document.getElementById('errorMessage');
        const endMessage       = document.getElementById('endMessage');
        const modalOverlay     = document.getElementById('modalOverlay');
        const modalPlayer      = document.getElementById('modalPlayer');
        const modalTitle       = document.getElementById('modalTitle');
        const modalBack        = document.getElementById('modalBack');

        /* ── Use native TG BackButton if available, else show in-app button ── */
        const useNativeBack = hasTg && !!tg.BackButton;

        if (!useNativeBack) {
            // Show in-app back button as fallback
            modalBack.classList.remove('hidden');
        }

        function onBackPressed() {
            if (modalOverlay.classList.contains('active')) closePlayer();
        }

        modalBack.addEventListener('click', onBackPressed);

        /* ── Modal open / close ── */
        function openPlayer(embedUrl, title) {
            modalPlayer.innerHTML = `<iframe src="${embedUrl}" allowfullscreen allow="autoplay"></iframe>`;
            modalTitle.textContent = title;
            modalOverlay.classList.add('active');
            modalOverlay.setAttribute('aria-hidden', 'false');

            if (useNativeBack) {
                tg.BackButton.show();
                tg.BackButton.onClick(onBackPressed);
            }
        }

        function closePlayer() {
            modalOverlay.classList.remove('active');
            modalOverlay.setAttribute('aria-hidden', 'true');
            // Stop video playback
            modalPlayer.innerHTML = '';

            if (useNativeBack) {
                tg.BackButton.hide();
                tg.BackButton.offClick(onBackPressed);
            }
        }

        // Desktop / debug: Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && modalOverlay.classList.contains('active')) closePlayer();
        });

        /* ── Search state ── */
        const EPORNER_API = 'https://www.eporner.com/api/v2/video/search/';
        const PER_PAGE = 10;

        let currentQuery = '';
        let currentPage  = 1;
        let totalPages   = 0;
        let isLoading    = false;
        let reachedEnd   = false;

        function toggleClearButton() {
            clearBtn.style.display = searchInput.value.trim().length > 0 ? 'block' : 'none';
        }

        function clearSearch() {
            searchInput.value = '';
            currentQuery = '';
            currentPage  = 1;
            reachedEnd   = false;
            videosGrid.innerHTML = '';
            hideAllStatusMessages();
            toggleClearButton();
        }

        function hideAllStatusMessages() {
            initialMessage.classList.add('hidden');
            noResultsMessage.classList.add('hidden');
            errorMessage.classList.add('hidden');
            endMessage.classList.add('hidden');
        }

        function showLoading(show) {
            loadingIndicator.classList.toggle('hidden', !show);
        }

        function buildApiUrl(query, page) {
            const params = new URLSearchParams({
                query, per_page: String(PER_PAGE), page: String(page),
                thumbsize: 'big', order: 'top-weekly',
                gay: '1', lq: '1', format: 'json'
            });
            return `${EPORNER_API}?${params.toString()}`;
        }

        function createVideoCard(video) {
            const thumbSrc  = video.thumbs?.[0]?.src || 'https://via.placeholder.com/320x180?text=No+Image';
            const rawTitle  = video.title || 'Untitled';
            const safeTitle = rawTitle
                .replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
                .replace(/'/g,'&#039;');
            const embedUrl = video.embed || '';

            const card = document.createElement('div');
            card.className = 'video-card';
            card.innerHTML = `
                <img class="video-thumb" src="${thumbSrc}" alt="" loading="lazy">
                <div class="video-info">
                    <div class="video-title">${safeTitle}</div>
                    <button class="video-link play-btn">&#9654; Play</button>
                </div>
            `;
            card.querySelector('.play-btn').addEventListener('click', () => {
                if (embedUrl) openPlayer(embedUrl, rawTitle);
            });
            return card;
        }

        function renderVideos(videos) {
            videos.forEach(v => videosGrid.appendChild(createVideoCard(v)));
        }

        async function loadVideos(isNewSearch = false) {
            if (isLoading) return;
            if (!currentQuery.trim()) return;
            if (reachedEnd && !isNewSearch) return;

            if (isNewSearch) {
                currentPage  = 1;
                reachedEnd   = false;
                videosGrid.innerHTML = '';
                hideAllStatusMessages();
            }

            showLoading(true);
            isLoading = true;
            searchBtn.disabled = true;

            try {
                const res  = await fetch(buildApiUrl(currentQuery, currentPage));
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();

                totalPages   = data.total_pages ?? 0;
                const videos = data.videos || [];

                if (isNewSearch && videos.length === 0) {
                    hideAllStatusMessages();
                    noResultsMessage.classList.remove('hidden');
                    reachedEnd = true;
                    return;
                }

                renderVideos(videos);
                currentPage++;

                if (currentPage > totalPages) {
                    reachedEnd = true;
                    hideAllStatusMessages();
                    if (videos.length > 0) endMessage.classList.remove('hidden');
                } else if (isNewSearch) {
                    hideAllStatusMessages();
                }
            } catch (err) {
                console.error('API error:', err);
                hideAllStatusMessages();
                errorMessage.classList.remove('hidden');
                reachedEnd = false;
            } finally {
                isLoading = false;
                searchBtn.disabled = false;
                showLoading(false);
            }
        }

        function onContentScroll() {
            if (isLoading || reachedEnd || !currentQuery.trim()) return;
            const { scrollTop, scrollHeight, clientHeight } = contentEl;
            if (scrollTop + clientHeight >= scrollHeight - 300) loadVideos(false);
        }

        function performSearch() {
            const query = searchInput.value.trim();
            hideAllStatusMessages();
            if (!query) {
                initialMessage.classList.remove('hidden');
                videosGrid.innerHTML = '';
                currentQuery = '';
                currentPage  = 1;
                reachedEnd   = false;
                return;
            }
            currentQuery = query;
            loadVideos(true);
        }

        searchInput.addEventListener('input', toggleClearButton);
        clearBtn.addEventListener('click', (e) => { e.stopPropagation(); clearSearch(); hideAllStatusMessages(); });
        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') performSearch(); });
        contentEl.addEventListener('scroll', onContentScroll);

        hideAllStatusMessages();
        toggleClearButton();
    })();
    </script>
</body>
</html>
